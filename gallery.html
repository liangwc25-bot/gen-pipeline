<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="图库">
<meta name="theme-color" content="#0f0f14">
<link rel="manifest" href="/manifest.json">
<title>生图库 · img.0x01.qzz.io</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --accent: #7c5cfc;
    --green: #4ade80;
    --pink: #f43f5e;
    --orange: #fb923c;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --radius: 12px;
  }
  [data-theme="light"] { --bg:#f8f9fc; --card:#fff; --accent:#6c4ce0; --green:#16a34a; --pink:#e11d48; --orange:#ea580c; --text:#1e293b; --text2:#64748b; }
  [data-theme="light"] body { background: radial-gradient(ellipse at 50% 0%, #e8ecf4 0%, #f8f9fc 70%); background-attachment: fixed; }
  [data-theme="light"] .header { background: rgba(255,255,255,0.7); border-bottom-color: rgba(108,76,224,0.15); }
  [data-theme="light"] .thumb-card, [data-theme="light"] .modal, [data-theme="light"] .btn, [data-theme="light"] .pagination .page-btn { border-color: rgba(0,0,0,0.06) !important; }
  [data-theme="light"] .btn { background: rgba(0,0,0,0.03); }
  [data-theme="light"] .pagination .page-btn { background: rgba(0,0,0,0.03); }
  [data-theme="light"] .modal-overlay.open { background: rgba(0,0,0,0.5); }
  [data-theme="light"] .modal-nav { background: rgba(0,0,0,0.3); }
  [data-theme="light"] .btn.active { box-shadow: 0 0 12px rgba(108,76,224,0.25); }
  [data-theme="light"] .btn.archive-active { box-shadow: 0 0 12px rgba(234,88,12,0.25); }
  [data-theme="light"] .pagination .page-btn.active { box-shadow: 0 0 8px rgba(108,76,224,0.25); }
  [data-theme="light"] input, [data-theme="light"] textarea, [data-theme="light"] select { background: rgba(0,0,0,0.03) !important; border-color: rgba(0,0,0,0.12) !important; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #1a1a30 0%, var(--bg) 70%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(124,92,252,0.12);
    flex-wrap: wrap; gap: 4px;
    backdrop-filter: blur(8px);
    background: rgba(15,15,20,0.6);
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 {
    font-size: 1.1rem; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 5px 9px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: var(--text); font-size: 0.73rem;
    cursor: pointer; transition: all .25s ease;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 0 12px rgba(124,92,252,0.3);
  }
  .btn.archive-active {
    background: var(--orange); border-color: var(--orange); color: #fff;
    box-shadow: 0 0 12px rgba(251,146,60,0.3);
  }
  .count { color: var(--text2); font-size: 0.75rem; font-weight: 400; margin-left: 4px; opacity: 0.7; -webkit-text-fill-color: var(--text2); }
  .filter-bar { display: flex; gap: 6px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; padding: 20px 24px;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
  }
  .thumb-card {
    position: relative;
    background: var(--card); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .thumb-card:hover {
    border-color: rgba(124,92,252,0.4);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,92,252,0.15);
  }
  .thumb-card img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: transform .4s ease;
  }
  .thumb-card:hover img { transform: scale(1.05); }
  .thumb-card .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
    opacity: 0; transition: opacity .3s ease;
    display: flex; align-items: flex-end; padding: 8px 10px;
    pointer-events: none; z-index: 1;
  }
  .thumb-card:hover .card-overlay { opacity: 1; }
  .card-overlay .card-name {
    color: #fff; font-size: 0.75rem; font-weight: 500;
    line-height: 1.3; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .thumb-card .no-thumb {
    color: var(--text2); font-size: 0.8rem; text-align: center; padding: 8px;
  }

  /* Favorite star on thumb */
  .fav-star {
    position: absolute; top: 6px; right: 6px;
    font-size: 1.1rem; line-height: 1;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    border: none; color: #fff;
    transition: .2s ease;
  }
  .fav-star:hover { transform: scale(1.15); background: rgba(0,0,0,0.5); }
  .fav-star.on { color: var(--pink); }
  .fav-star.off { color: rgba(255,255,255,0.5); }
  .fav-star.off:hover { color: var(--pink); }

  /* Archive button on thumb */
  .arch-btn {
    position: absolute; top: 6px; left: 6px;
    font-size: 0.95rem; line-height: 1;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    border: none; color: #fff;
    transition: .2s ease;
  }
  .arch-btn:hover { transform: scale(1.15); background: rgba(0,0,0,0.5); }
  .arch-btn.on { color: var(--orange); }
  .arch-btn.off { color: rgba(255,255,255,0.4); }
  .arch-btn.off:hover { color: var(--orange); }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 24px 24px; flex-wrap: wrap;
  }
  .pagination .page-btn {
    min-width: 34px; height: 34px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03); color: var(--text2); font-size: 0.85rem;
    cursor: pointer; transition: all .2s ease;
    backdrop-filter: blur(4px);
  }
  .pagination .page-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(124,92,252,0.08); }
  .pagination .page-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 0 8px rgba(124,92,252,0.3);
  }
  .pagination .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pagination .ellipsis { color: var(--text2); font-size: 0.85rem; padding: 0 4px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(12px);
  }
  .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
  .modal {
    background: var(--card); border-radius: var(--radius);
    max-width: 95vw; max-height: 95vh; overflow-y: auto;
    width: 700px; padding: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    position: relative;
  }
  .modal img {
    width: 100%; border-radius: 8px; display: block;
  }
  .modal-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .modal-actions {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 8px;
  }
  .modal-close {
    background: none; border: none;
    color: var(--text2); font-size: 1.5rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }
  .modal-fav-btn, .modal-arch-btn, .modal-del-btn, .modal-send-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 0.85rem; cursor: pointer;
    transition: .15s;
    margin-left: 4px;
    white-space: nowrap;
  }
  .modal-fav-btn:hover { border-color: var(--pink); }
  .modal-fav-btn.on { color: var(--pink); border-color: var(--pink); }
  .modal-arch-btn:hover { border-color: var(--orange); }
  .modal-arch-btn.on { color: var(--orange); border-color: var(--orange); }
  .modal-del-btn:hover { border-color: #ef4444; color: #ef4444; }
  .modal-send-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .modal-send-btn.sending { border-color: #3b82f6; color: #3b82f6; opacity: 0.6; pointer-events: none; }
  .modal-gif-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 0.85rem; cursor: pointer;
    transition: .15s;
    margin-left: 4px;
    white-space: nowrap;
  }
  .modal-gif-btn:hover { border-color: var(--green); color: var(--green); }
  .modal-gif-btn.sending { border-color: var(--green); color: var(--green); opacity: 0.6; pointer-events: none; }
  .modal-i2v-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text2); font-size: 0.85rem; cursor: pointer;
    transition: .15s; margin-left: 4px; white-space: nowrap;
  }
  .modal-i2v-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-i2v-btn.sending { border-color: var(--accent); color: var(--accent); opacity: 0.6; pointer-events: none; }
  /* I2V Panel */
  .i2v-panel {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: rgba(124, 92, 252, 0.06);
    border: 1px solid rgba(124, 92, 252, 0.2);
    border-radius: 10px;
  }
  .i2v-panel.show { display: block; }
  .i2v-panel textarea {
    width: 100%;
    box-sizing: border-box;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--text);
    padding: 10px;
    font-size: 0.85rem;
    font-family: inherit;
    resize: vertical;
    min-height: 60px;
  }
  .i2v-panel textarea:focus { outline: none; border-color: var(--accent); }
  .i2v-params {
    display: flex; gap: 8px;
    margin-top: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .i2v-params label {
    color: var(--text2); font-size: 0.78rem;
    display: flex; align-items: center; gap: 4px;
  }
  .i2v-params input, .i2v-params select {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: var(--text); padding: 4px 8px;
    font-size: 0.82rem; width: 55px;
  }
  .i2v-params select { width: auto; }
  .i2v-params input:focus, .i2v-params select:focus {
    outline: none; border-color: var(--accent);
  }
  .i2v-submit-btn {
    background: var(--accent); border: none;
    border-radius: 8px; color: #fff; padding: 8px 18px;
    font-size: 0.85rem; cursor: pointer; transition: .15s;
    margin-top: 10px;
  }
  .i2v-submit-btn:hover { opacity: 0.85; }
  .i2v-submit-btn:disabled { opacity: 0.5; pointer-events: none; }
  .i2v-status {
    margin-top: 8px; font-size: 0.8rem; color: var(--text2);
  }
  .i2v-status.success { color: var(--green); }
  .i2v-status.error { color: var(--red); }
  .modal-copy-btn {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: var(--text2); cursor: pointer;
    font-size: 0.8rem; padding: 2px 8px; margin-left: 6px; transition: .15s;
    vertical-align: middle;
  }
  .modal-copy-btn:hover { border-color: var(--green); color: var(--green); }
  .modal-copy-btn.copied { color: var(--green); border-color: var(--green); }
  .modal-meta {
    margin-top: 16px; word-break: break-word;
  }
  .modal-meta .field {
    margin-bottom: 10px; font-size: 0.9rem; line-height: 1.5;
  }
  .modal-meta .label {
    color: var(--accent); font-weight: 600; display: inline;
  }
  .modal-meta .value {
    color: var(--text); display: inline;
  }
  .modal-meta .prompt-text {
    color: var(--green); display: inline;
  }
  .modal-info {
    margin-top: 12px; display: flex; gap: 16px;
    color: var(--text2); font-size: 0.8rem; flex-wrap: wrap;
  }
  .modal-bottom-actions {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .modal-counter {
    color: var(--text2); font-size: 0.8rem;
  }

  /* Nav arrows */
  .modal-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.5); color: #fff;
    border: none; border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10;
    font-size: 1.4rem; line-height: 1;
    transition: .15s; user-select: none;
  }
  .modal-nav:hover { background: rgba(0,0,0,0.8); }
  .modal-nav.prev { left: -50px; }
  .modal-nav.next { right: -50px; }
  @media (max-width: 780px) {
    .modal-nav.prev { left: -16px; }
    .modal-nav.next { right: -16px; }
    .modal-nav { width: 32px; height: 32px; font-size: 1rem; }
  }

  /* ── Carousel (scroll-snap) ── */
  .modal-swipe-area {
    position: relative;
  }
  .carousel-viewport {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    border-radius: 8px;
    /* hide scrollbar */
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .carousel-viewport::-webkit-scrollbar { display: none; }
  .carousel-slide {
    flex: 0 0 100%;
    width: 100%;
    scroll-snap-align: center;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 24px; color: var(--text2);
  }
  .empty .big { font-size: 3rem; margin-bottom: 12px; }

  /* ── Selection mode ── */
  .sel-check {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.4); background: rgba(0,0,0,0.4);
    display: none; z-index: 3; pointer-events: none;
  }
  .select-mode .sel-check { display: block; }
  .thumb-card.selected .sel-check {
    background: var(--accent); border-color: var(--accent);
  }
  .thumb-card.selected .sel-check::after {
    content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; font-size: 0.8rem; font-weight: 700; line-height: 1;
  }
  .select-mode .thumb-card { cursor: pointer; }
  .select-mode .fav-star, .select-mode .arch-btn { pointer-events: none; opacity: 0.3; }

  /* Batch action bar */
  .batch-bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
    background: var(--card); border-top: 1px solid rgba(255,255,255,0.08);
    padding: 12px 24px; gap: 10px; align-items: center;
    backdrop-filter: blur(12px);
  }
  .batch-bar.open { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }
  .batch-bar .batch-count { color: var(--text2); font-size: 0.8rem; width: 100%; text-align: center; margin-bottom: 2px; }
  .batch-bar .batch-btn {
    padding: 6px 14px; border-radius: 10px; border: none;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: .15s;
  }
  .batch-btn.fav { background: rgba(244,63,94,0.15); color: var(--pink); }
  .batch-btn.fav:hover { background: rgba(244,63,94,0.25); }
  .batch-btn.arch { background: rgba(251,146,60,0.15); color: var(--orange); }
  .batch-btn.arch:hover { background: rgba(251,146,60,0.25); }
  .batch-btn.trash { background: rgba(239,68,68,0.15); color: #ef4444; }
  .batch-btn.trash:hover { background: rgba(239,68,68,0.25); }
  .batch-btn.cancel { background: rgba(255,255,255,0.06); color: var(--text2); }
  [data-theme="light"] .batch-bar { border-top-color: rgba(0,0,0,0.08); }

  .filter-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
  .filter-bar select, .filter-bar input {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 0.85rem;
    outline: none; min-width: 180px;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
  [data-theme="light"] .filter-bar select, [data-theme="light"] .filter-bar input {
    background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08);
  }
</style>
</head>
<body>
<div class="header">
  <h1>✦ 生图库 <span class="count" id="count"></span></h1>
  <div class="header-actions">
    <button class="btn active" id="filterAll" onclick="setFilter('all')">全部</button>
    <button class="btn" id="filterFav" onclick="setFilter('fav')">♥ 收藏</button>
    <button class="btn" id="filterArchive" onclick="setFilter('archive')">📦 存档</button>
    <button class="btn" onclick="rescan()" id="rescanBtn">⟳ 扫描</button>
    <button class="btn" id="selectBtn" onclick="toggleSelectMode()">☐ 选择</button>
  </div>
</div>
<div class="filter-bar" id="filterBar">
  <select id="modelFilter" onchange="applyFilters()">
    <option value="">🔮 全部模型</option>
  </select>
  <input type="text" id="searchInput" placeholder="🔍 搜索 prompt…" oninput="applyFiltersDebounced()">
</div>
<div id="grid" class="grid"></div>
<div id="batchBar" class="batch-bar">
  <span class="batch-count" id="batchCount">已选 0 张</span>
  <button class="batch-btn fav" onclick="batchOp('favorite')">♥ 收藏</button>
  <button class="batch-btn arch" onclick="batchOp('archive')">📦 存档</button>
  <button class="batch-btn trash" onclick="batchOp('trash')">🗑 回收</button>
  <button class="batch-btn cancel" onclick="toggleSelectMode()">取消</button>
</div>
<div id="pagination" class="pagination"></div>
<div id="empty" class="empty" style="display:none">
  <div class="big">📭</div>
  <p id="emptyMsg">还没有生图，先去首页生成一张吧</p>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-counter" id="modalCounter"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-actions">
      <button class="modal-arch-btn" id="modalArchBtn" onclick="toggleArchModal()">📦 存档</button>
      <button class="modal-fav-btn" id="modalFavBtn" onclick="toggleFavModal()">♡ 收藏</button>
      <button class="modal-del-btn" id="modalDelBtn" onclick="moveToTrash()">🗑 回收</button>
    </div>
    <div class="modal-swipe-area">
      <button class="modal-nav prev" id="navPrev" onclick="event.stopPropagation(); navModal(-1)">‹</button>
      <div class="carousel-viewport" id="carouselViewport">
        <img class="carousel-slide" src="" alt="">
        <img class="carousel-slide" src="" alt="">
        <img class="carousel-slide" id="modalImg" src="" alt="">
        <img class="carousel-slide" src="" alt="">
        <img class="carousel-slide" src="" alt="">
      </div>
      <button class="modal-nav next" id="navNext" onclick="event.stopPropagation(); navModal(1)">›</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-bottom-actions">
      <button class="modal-send-btn" id="modalSendBtn" onclick="sendToTg()">📱 传送</button>
      <button class="modal-gif-btn" id="modalGifBtn" onclick="makeGif()">🎞 GIF</button>
      <button class="modal-i2v-btn" id="modalI2vBtn" onclick="toggleI2vPanel()">🎬 转视频</button>
    </div>
    <!-- I2V Panel -->
    <div class="i2v-panel" id="i2vPanel">
      <textarea id="i2vPrompt" placeholder="动作描述（英文）: She slowly turns, hair flowing..."></textarea>
      <div class="i2v-params">
        <label>帧数 <input type="number" id="i2vFrames" value="81" min="1" max="200"></label>
        <label>fps <input type="number" id="i2vFps" value="20" min="8" max="30"></label>
        <label>分辨率
          <select id="i2vRes">
            <option value="720p">720p</option>
            <option value="480p">480p</option>
          </select>
        </label>
      </div>
      <button class="i2v-submit-btn" id="i2vSubmitBtn" onclick="submitI2V()">▶ 生成视频</button>
      <div class="i2v-status" id="i2vStatus"></div>
    </div>
  </div>
</div>

<script>
let currentPage = 1;
let totalPages = 1;
let totalImages = 0;
let allImages = [];
let modalImageList = [];   // the filtered list for modal navigation
let modalIndex = -1;
let favorites = new Set();
let archived = new Set();
let filterMode = 'all';
const PER_PAGE = 50;

// ── Load favorites ──
async function loadFavorites() {
  try {
    const res = await fetch('/api/favorites');
    const data = await res.json();
    favorites = new Set(data.favorites);
  } catch(e) {
    favorites = new Set();
  }
}

// ── Load archived ──
async function loadArchived() {
  try {
    const res = await fetch('/api/archived');
    const data = await res.json();
    archived = new Set(data.archived);
  } catch(e) {
    archived = new Set();
  }
}

// ── Toggle favorite ──
async function toggleFav(filename, updateUI) {
  const res = await fetch(`/api/favorite?filename=${encodeURIComponent(filename)}`);
  const data = await res.json();
  if (data.favorited) {
    favorites.add(filename);
  } else {
    favorites.delete(filename);
  }
  if (updateUI) updateUI(filename);
  // In fav mode, re-filter locally (no server reload)
  if (filterMode === 'fav') {
    modalImageList = allImages.filter(img => favorites.has(img.filename));
    renderGrid(modalImageList);
    renderPagination(modalImageList.length);
  }
}

// ── Toggle archive ──
async function toggleArch(filename, updateUI) {
  const res = await fetch(`/api/archive?filename=${encodeURIComponent(filename)}`);
  if (!res.ok) return;
  const data = await res.json();
  if (data.archived) {
    archived.add(filename);
  } else {
    archived.delete(filename);
  }
  if (updateUI) updateUI(filename);
  // If file moved away from current view, remove locally + background refresh
  if ((filterMode === 'all' || filterMode === 'fav') && data.archived) {
    removeFromLocal(filename);
    refreshCache();
    return;
  }
  if (filterMode === 'archive' && !data.archived) {
    removeFromLocal(filename);
    refreshCache();
    return;
  }
}

// ── Local remove (no server reload) ──
function removeFromLocal(filename) {
  const idx = allImages.findIndex(img => img.filename === filename);
  if (idx >= 0) allImages.splice(idx, 1);
  const midx = modalImageList.findIndex(img => img.filename === filename);
  if (midx >= 0) modalImageList.splice(midx, 1);
  totalImages--;

  if (modalImageList.length === 0 && currentPage > 1) {
    // Page empty — fall back to previous page (triggers server load)
    loadPage(currentPage - 1);
    return;
  }

  renderGrid(modalImageList);
  renderPagination(modalImageList.length);
  document.getElementById('count').textContent = `${totalImages} 张`;
  if (totalImages === 0) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('emptyMsg').textContent = filterMode === 'archive'
      ? '还没有存档图片' : '还没有生图';
  }
}

// ── Background cache refresh (non-blocking) ──
function refreshCache() {
  fetch('/api/rescan').catch(() => {});
}

function updateFavUI(filename) {
  const star = document.querySelector(`.fav-star[data-file="${CSS.escape(filename)}"]`);
  if (star) {
    star.textContent = favorites.has(filename) ? '♥' : '♡';
    star.className = 'fav-star ' + (favorites.has(filename) ? 'on' : 'off');
  }
  const modalFav = document.getElementById('modalFavBtn');
  if (modalFav.dataset.file === filename) {
    modalFav.textContent = favorites.has(filename) ? '♥ 已收藏' : '♡ 收藏';
    modalFav.className = 'modal-fav-btn ' + (favorites.has(filename) ? 'on' : '');
  }
}

function updateArchUI(filename) {
  const btn = document.querySelector(`.arch-btn[data-file="${CSS.escape(filename)}"]`);
  if (btn) {
    btn.className = 'arch-btn ' + (archived.has(filename) ? 'on' : 'off');
  }
  const modalArch = document.getElementById('modalArchBtn');
  if (modalArch.dataset.file === filename) {
    modalArch.textContent = archived.has(filename) ? '📤 取出' : '📦 存档';
    modalArch.className = 'modal-arch-btn ' + (archived.has(filename) ? 'on' : '');
  }
}

// ── I2V (Image to Video) ──
function toggleI2vPanel() {
  const panel = document.getElementById('i2vPanel');
  const status = document.getElementById('i2vStatus');
  panel.classList.toggle('show');
  status.textContent = '';
  status.className = 'i2v-status';
  // Populate default prompt if empty
  const promptEl = document.getElementById('i2vPrompt');
  if (!promptEl.value.trim()) {
    promptEl.value = 'She slowly moves, gentle breathing, soft breeze through hair';
  }
}

async function submitI2V() {
  if (!modalFilename) return;
  const prompt = document.getElementById('i2vPrompt').value.trim();
  if (!prompt) {
    document.getElementById('i2vStatus').textContent = '⚠ 请填写动作描述';
    document.getElementById('i2vStatus').className = 'i2v-status error';
    return;
  }
  const btn = document.getElementById('i2vSubmitBtn');
  const status = document.getElementById('i2vStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中…（约 2-5 分钟）';
  status.textContent = '提交到 Replicate...';
  status.className = 'i2v-status';

  const numFrames = parseInt(document.getElementById('i2vFrames').value) || 81;
  const fps = parseInt(document.getElementById('i2vFps').value) || 20;
  const resolution = document.getElementById('i2vRes').value;

  try {
    const res = await fetch('/api/i2v', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        filename: modalFilename,
        prompt: prompt,
        provider: 'replicate-wan',
        num_frames: numFrames,
        fps: fps,
        resolution: resolution,
      }),
    });
    const data = await res.json();
    if (data.success) {
      status.textContent = `✅ 完成！(${data.elapsed_s}s) — 刷新页面查看视频`;
      status.className = 'i2v-status success';
      btn.textContent = '▶ 生成视频';
      btn.disabled = false;
      // Refresh grid and open the video
      setTimeout(async () => {
        await loadPage(currentPage);
        openModal(data.filename);
      }, 1500);
    } else {
      status.textContent = '❌ ' + (data.error || '失败');
      status.className = 'i2v-status error';
      btn.textContent = '▶ 重试';
      btn.disabled = false;
    }
  } catch(e) {
    status.textContent = '❌ 网络错误: ' + e.message;
    status.className = 'i2v-status error';
    btn.textContent = '▶ 重试';
    btn.disabled = false;
  }
}

function updateAllUI(filename) {
  updateFavUI(filename);
  updateArchUI(filename);
}

let modalFilename = '';
function toggleFavModal() {
  if (modalFilename) toggleFav(modalFilename, updateAllUI);
}
function toggleArchModal() {
  if (modalFilename) toggleArch(modalFilename, updateAllUI);
}

function copyPromptMeta(btn) {
  const prompt = btn.dataset.prompt;
  navigator.clipboard.writeText(prompt).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋';
      btn.classList.remove('copied');
    }, 1200);
  });
}

function copyFilename(btn) {
  navigator.clipboard.writeText(btn.dataset.filename).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋';
      btn.classList.remove('copied');
    }, 1200);
  });
}

// ── Send to Telegram ──
async function sendToTg() {
  if (!modalFilename) return;
  const btn = document.getElementById('modalSendBtn');
  btn.textContent = '⏳ 发送中…';
  btn.classList.add('sending');
  try {
    const res = await fetch(`/api/send?filename=${encodeURIComponent(modalFilename)}`);
    const data = await res.json();
    if (data.sent) {
      btn.textContent = '✅ 已发送';
      setTimeout(() => { btn.textContent = '📱 传送'; btn.classList.remove('sending'); }, 2000);
    } else {
      btn.textContent = '❌ 失败';
      setTimeout(() => { btn.textContent = '📱 传送'; btn.classList.remove('sending'); }, 2000);
    }
  } catch(e) {
    btn.textContent = '❌ 失败';
    setTimeout(() => { btn.textContent = '📱 传送'; btn.classList.remove('sending'); }, 2000);
  }
}

// ── Make Breathing GIF ──
async function makeGif() {
  if (!modalFilename) return;
  const btn = document.getElementById('modalGifBtn');
  btn.textContent = '⏳ 生成中…';
  btn.classList.add('sending');
  try {
    const res = await fetch('/api/gif-zoom', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({filename: modalFilename}),
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = '✅ 完成';
      setTimeout(() => { btn.textContent = '🎞 GIF'; btn.classList.remove('sending'); }, 3000);
      // Refresh the grid and open the GIF
      await loadPage(currentPage);
      openModal(data.filename);
    } else {
      btn.textContent = '❌ ' + (data.error || '失败');
      setTimeout(() => { btn.textContent = '🎞 GIF'; btn.classList.remove('sending'); }, 3000);
    }
  } catch(e) {
    btn.textContent = '❌ 失败';
    setTimeout(() => { btn.textContent = '🎞 GIF'; btn.classList.remove('sending'); }, 3000);
  }
}

// ── Trash ──
async function moveToTrash() {
  if (!modalFilename) return;
  const res = await fetch(`/api/trash?filename=${encodeURIComponent(modalFilename)}`);
  if (!res.ok) return;
  const data = await res.json();
  if (!data.trashed) return;

  favorites.delete(modalFilename);
  archived.delete(modalFilename);

  const removedIdx = modalIndex;

  // Remove from local lists
  allImages = allImages.filter(img => img.filename !== modalFilename);
  modalImageList = modalImageList.filter(img => img.filename !== modalFilename);
  totalImages--;
  refreshCache();

  if (modalImageList.length === 0) {
    closeModal();
    return;
  }

  // Jump to next image (or prev if last was deleted)
  modalIndex = Math.min(removedIdx, modalImageList.length - 1);
  showModalImage();
}

// ── Load page ──
async function loadPage(page) {
  let apiFilter = filterMode;
  if (filterMode === 'archive') apiFilter = 'archive';
  else if (filterMode === 'fav') apiFilter = 'fav';
  else apiFilter = 'all';

  const model = document.getElementById('modelFilter').value;
  const search = document.getElementById('searchInput').value.trim();

  let url = `/api/images?page=${page}&per_page=${PER_PAGE}&filter=${apiFilter}`;
  if (model) url += `&model=${encodeURIComponent(model)}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  const res = await fetch(url);
  const data = await res.json();
  currentPage = data.page;
  totalPages = data.total_pages;
  totalImages = data.total;
  allImages = data.images;

  // Populate model dropdown from server response
  if (data.models && data.models.length) {
    const sel = document.getElementById('modelFilter');
    const currentVal = sel.value;
    sel.innerHTML = '<option value="">🔮 全部模型</option>';
    data.models.forEach(m => {
      sel.innerHTML += `<option value=\"${escapeHtml(m)}\" ${m === currentVal ? 'selected' : ''}>${escapeHtml(m)}</option>`;
    });
  }

  let displayImages = allImages;
  if (filterMode === 'fav') {
    displayImages = allImages.filter(img => favorites.has(img.filename));
  }
  modalImageList = displayImages;

  renderGrid(displayImages);
  renderPagination(displayImages.length);
  document.getElementById('count').textContent = `${data.total} 张`;
  document.getElementById('empty').style.display = data.total === 0 ? 'block' : 'none';
}

function applyFilters() {
  loadPage(1);
}

let _searchTimer = null;
function applyFiltersDebounced() {
  if (_searchTimer) clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => loadPage(1), 300);
}

function enc(f) { return encodeURIComponent(f); }

function renderGrid(images) {
  const grid = document.getElementById('grid');
  if (images.length === 0) {
    grid.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    if (filterMode === 'fav') {
      document.getElementById('emptyMsg').textContent = '还没有收藏的图片，点击 ♡ 按钮收藏吧';
    } else if (filterMode === 'archive') {
      document.getElementById('emptyMsg').textContent = '还没有存档图片，点击 📦 按钮存档吧';
    } else {
      document.getElementById('emptyMsg').textContent = '还没有生图，先去首页生成一张吧';
    }
    return;
  }
  document.getElementById('empty').style.display = 'none';
  grid.innerHTML = images.map(img => {
    const isFav = favorites.has(img.filename);
    const isArch = archived.has(img.filename);
    return `
    <div class="thumb-card" data-file="${escapeHtml(img.filename)}" onclick="selectCard(this, event)">
      <button class="arch-btn ${isArch ? 'on' : 'off'}" data-file="${escapeHtml(img.filename)}"
              onclick="event.stopPropagation(); toggleArch('${escapeHtml(img.filename)}', updateAllUI)">📦</button>
      <button class="fav-star ${isFav ? 'on' : 'off'}" data-file="${escapeHtml(img.filename)}"
              onclick="event.stopPropagation(); toggleFav('${escapeHtml(img.filename)}', updateAllUI)">${isFav ? '♥' : '♡'}</button>
      <img src="/thumb/${enc(img.filename)}" alt="" loading="lazy"
           onerror="this.parentElement.innerHTML='<div class=\\'no-thumb\\'>${escapeHtml(img.filename)}</div>'">
      <div class="card-overlay"><span class="card-name">${escapeHtml(img.filename)}</span></div>
      <div class="sel-check"></div>
    </div>`;
  }).join('');
}

function renderPagination(displayCount) {
  const el = document.getElementById('pagination');
  if (filterMode === 'fav') {
    if (totalImages <= PER_PAGE) { el.innerHTML = ''; return; }
  }
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = '';
  const p = currentPage, t = totalPages;
  html += `<button class="page-btn" ${p <= 1 ? 'disabled' : ''} onclick="loadPage(${p-1})">‹</button>`;
  let pages = [];
  if (t <= 7) {
    pages = Array.from({length: t}, (_, i) => i + 1);
  } else {
    pages.push(1);
    if (p > 3) pages.push('...');
    for (let i = Math.max(2, p - 1); i <= Math.min(t - 1, p + 1); i++) pages.push(i);
    if (p < t - 2) pages.push('...');
    pages.push(t);
  }
  pages.forEach(pp => {
    if (pp === '...') {
      html += `<span class="ellipsis">…</span>`;
    } else {
      html += `<button class="page-btn ${pp === p ? 'active' : ''}" onclick="loadPage(${pp})">${pp}</button>`;
    }
  });
  html += `<button class="page-btn" ${p >= t ? 'disabled' : ''} onclick="loadPage(${p+1})">›</button>`;
  // Page jump input
  html += `<span style="margin-left:8px;display:inline-flex;align-items:center;gap:4px;color:var(--text2);font-size:0.85rem">
    <input id="pageJump" type="number" min="1" max="${t}" value="${p}"
           style="width:48px;padding:4px 6px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--card);color:var(--text);font-size:0.85rem;text-align:center;outline:none"
           onfocus="this.select()"
           onkeydown="if(event.key==='Enter')goToPage(this.value)">
    <button class="page-btn" style="min-width:auto;padding:0 8px" onclick="goToPage(document.getElementById('pageJump').value)">跳</button>
  </span>`;
  el.innerHTML = html;
}

function goToPage(page) {
  const p = parseInt(page);
  if (p >= 1 && p <= totalPages && p !== currentPage) loadPage(p);
}

// ── Modal with navigation (scroll-snap) ──
let scrollTimeout = null;
let scrollSnapBusy = false;
let updatingSlides = false; // block scroll events during slide reset

function openModal(filename) {
  const decoded = decodeURIComponent(filename);
  modalIndex = modalImageList.findIndex(img => img.filename === decoded);
  if (modalIndex === -1) return;
  showModalImage();
}

function showModalImage() {
  if (modalIndex < 0 || modalIndex >= modalImageList.length) return;
  const img = modalImageList[modalIndex];
  if (!img) return;

  modalFilename = img.filename;

  // Reset I2V panel
  document.getElementById('i2vPanel').classList.remove('show');
  document.getElementById('i2vStatus').textContent = '';
  document.getElementById('i2vStatus').className = 'i2v-status';

  // Open modal first so viewport has width for scroll positioning
  const modal = document.getElementById('modal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  updateCarouselSlides();
  updateModalUI(img);
  modal.querySelector('.modal').scrollTop = 0;
}

function updateCarouselSlides() {
  const slides = document.querySelectorAll('#carouselViewport .carousel-slide');
  if (slides.length < 5) return;

  for (let offset = -2; offset <= 2; offset++) {
    const idx = modalIndex + offset;
    const img = (idx >= 0 && idx < modalImageList.length) ? modalImageList[idx] : null;
    slides[offset + 2].src = img ? `/raw/${encodeURIComponent(img.filename)}` : '';
  }

  // Scroll to current slide (index 2) silently
  updatingSlides = true;
  const vp = document.getElementById('carouselViewport');
  const sw = vp.offsetWidth;
  vp.style.scrollBehavior = 'auto';
  vp.scrollLeft = sw * 2;
  vp.offsetHeight;
  vp.style.scrollBehavior = 'smooth';
  setTimeout(() => { updatingSlides = false; }, 50);
}

function navModal(direction) {
  const newIdx = modalIndex + direction;
  // Same-page: use scroll-snap slide
  if (newIdx >= 0 && newIdx < modalImageList.length) {
    const vp = document.getElementById('carouselViewport');
    const sw = vp.offsetWidth;
    scrollSnapBusy = true;
    vp.scrollBy({ left: direction * sw, behavior: 'smooth' });
    return;
  }

  // Cross-page navigation
  const targetPage = direction > 0 ? currentPage + 1 : currentPage - 1;
  if (targetPage < 1 || targetPage > totalPages) return;

  document.getElementById('modalImg').style.opacity = '0.4';

  let apiFilter = filterMode === 'archive' ? 'archive' : 'all';
  if (filterMode === 'fav') apiFilter = 'fav';
  fetch(`/api/images?page=${targetPage}&per_page=${PER_PAGE}&filter=${apiFilter}`)
    .then(r => r.json())
    .then(data => {
      currentPage = data.page;
      totalPages = data.total_pages;
      totalImages = data.total;
      allImages = data.images;

      let displayImages = allImages;
      if (filterMode === 'fav') {
        displayImages = allImages.filter(img => favorites.has(img.filename));
      }
      modalImageList = displayImages;

      modalIndex = direction > 0 ? 0 : modalImageList.length - 1;
      showModalImage();
      document.getElementById('modalImg').style.opacity = '';
    });
}

// Scroll-snap: detect when user finishes scrolling and update state
document.getElementById('carouselViewport').addEventListener('scroll', () => {
  if (updatingSlides && !scrollSnapBusy) return; // skip programmatic resets, allow navModal
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const vp = document.getElementById('carouselViewport');
    const sw = vp.offsetWidth;
    if (sw === 0) return;
    const slideIdx = Math.round(vp.scrollLeft / sw);

    if (slideIdx === 2) {
      // Stayed on current — just ensure smooth is on
      vp.style.scrollBehavior = 'smooth';
      scrollSnapBusy = false;
      return;
    }

    const direction = slideIdx - 2; // -2, -1, 1, or 2
    const newIdx = modalIndex + direction;
    if (newIdx < 0 || newIdx >= modalImageList.length) {
      // At boundary — snap back to current
      vp.style.scrollBehavior = 'smooth';
      vp.scrollLeft = sw * 2;
      scrollSnapBusy = false;
      return;
    }

    // Update to new image
    modalIndex = newIdx;
    const img = modalImageList[modalIndex];
    modalFilename = img.filename;
    updateCarouselSlides();
    updateModalUI(img);
    document.getElementById('modal').querySelector('.modal').scrollTop = 0;
    scrollSnapBusy = false;
  }, 150);
});

function updateModalUI(img) {
  const globalIdx = (currentPage - 1) * PER_PAGE + modalIndex + 1;
  document.getElementById('modalCounter').textContent = `${globalIdx} / ${totalImages}`;

  document.getElementById('navPrev').style.display = modalIndex > 0 ? 'flex' : 'none';
  document.getElementById('navNext').style.display = modalIndex < modalImageList.length - 1 ? 'flex' : 'none';

  const isFav = favorites.has(img.filename);
  const favBtn = document.getElementById('modalFavBtn');
  favBtn.textContent = isFav ? '♥ 已收藏' : '♡ 收藏';
  favBtn.className = 'modal-fav-btn ' + (isFav ? 'on' : '');
  favBtn.dataset.file = img.filename;

  const isArch = archived.has(img.filename);
  const archBtn = document.getElementById('modalArchBtn');
  archBtn.textContent = isArch ? '📤 取出' : '📦 存档';
  archBtn.className = 'modal-arch-btn ' + (isArch ? 'on' : '');
  archBtn.dataset.file = img.filename;

  // Metadata — lazy load from /api/meta
  const meta = document.getElementById('modalMeta');
  meta.innerHTML = '<div class="field"><span class="value" style="color:var(--text2)">加载中…</span></div>';
  fetch(`/api/meta?filename=${encodeURIComponent(img.filename)}`)
    .then(r => r.json())
    .then(m => {
      let html = '';
      if (m.prompt) {
        const escaped = escapeHtml(m.prompt);
        html += `<div class="field"><span class="label">Prompt  </span><span class="prompt-text">${escaped}</span> <button class="modal-copy-btn" onclick="copyPromptMeta(this)" data-prompt="${escaped}">📋</button></div>`;
      }
      if (m.params) {
        const rest = m.params.replace(/^Prompt:.*?(\n|$)/, '').replace(/^\n/, '');
        html += `<div class="field"><span class="label">参数  </span><span class="value">${escapeHtml(rest)}</span></div>`;
      }
      meta.innerHTML = html || '<div class="field"><span class="value" style="color:var(--text2)">无 metadata</span></div>';
      document.getElementById('modalInfo').innerHTML = `
        <span>${img.size_kb} KB</span>
        <span>${m.model || ''}</span>
        <div style="flex-basis:100%;display:flex;align-items:center;gap:4px;margin-top:2px">
          <span style="word-break:break-all">${img.filename}</span>
          <button class="modal-copy-btn" onclick="copyFilename(this)" data-filename="${escapeHtml(img.filename)}">📋</button>
        </div>
      `;
    })
    .catch(() => { meta.innerHTML = ''; });

  document.getElementById('modalInfo').innerHTML = `
    <span>${img.size_kb} KB</span>
    <span>${img.model ? img.model : ''}</span>
    <div style="flex-basis:100%;display:flex;align-items:center;gap:4px;margin-top:2px">
      <span style="word-break:break-all">${img.filename}</span>
      <button class="modal-copy-btn" onclick="copyFilename(this)" data-filename="${escapeHtml(img.filename)}">📋</button>
    </div>
  `;
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal').querySelector('.modal') && e.target.closest('.modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  renderGrid(modalImageList);
  renderPagination(modalImageList.length);
  document.getElementById('count').textContent = `${totalImages} 张`;
  const lastImg = modalImageList[modalIndex];
  if (lastImg) {
    const cards = document.querySelectorAll('.thumb-card');
    const card = cards[modalIndex];
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}
function setFilter(mode) {
  filterMode = mode;
  document.getElementById('filterAll').className = 'btn' + (mode === 'all' ? ' active' : '');
  document.getElementById('filterFav').className = 'btn' + (mode === 'fav' ? ' active' : '');
  document.getElementById('filterArchive').className = 'btn' + (mode === 'archive' ? ' archive-active' : '');
  loadPage(1);
}

async function rescan() {
  const btn = document.getElementById('rescanBtn');
  btn.disabled = true; btn.textContent = '⟳ 扫描中...';
  await fetch('/api/rescan');
  await loadFavorites();
  await loadArchived();
  await loadPage(1);
  btn.disabled = false; btn.textContent = '⟳ 扫描';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});

// ════════════════════ Selection Mode ════════════════════
let selectMode = false;
const selected = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  document.getElementById('grid').classList.toggle('select-mode', selectMode);
  document.getElementById('batchBar').classList.toggle('open', selectMode);
  document.getElementById('selectBtn').textContent = selectMode ? '☑ 取消' : '☐ 选择';
  document.getElementById('selectBtn').classList.toggle('active', selectMode);
  if (!selectMode) { selected.clear(); updateCardSelection(); }
  updateBatchBar();
}

function selectCard(card, event) {
  if (!selectMode) { openModal(card.querySelector('img') ? card.dataset.file : ''); return; }
  event.stopPropagation();
  const fn = card.dataset.file;
  if (selected.has(fn)) { selected.delete(fn); card.classList.remove('selected'); }
  else { selected.add(fn); card.classList.add('selected'); }
  updateBatchBar();
}

function updateCardSelection() {
  document.querySelectorAll('.thumb-card').forEach(card => {
    card.classList.toggle('selected', selected.has(card.dataset.file));
  });
}

function updateBatchBar() {
  if (!selectMode) return;
  document.getElementById('batchCount').textContent = `已选 ${selected.size} 张`;
}

async function batchOp(action) {
  if (selected.size === 0) return;
  const filenames = [...selected];
  const res = await fetch('/api/batch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, filenames }),
  });
  const data = await res.json();
  // Update local sets
  if (action === 'favorite') filenames.forEach(f => favorites.add(f));
  else if (action === 'archive') filenames.forEach(f => { archived.add(f); favorites.delete(f); });
  else if (action === 'trash') filenames.forEach(f => { archived.delete(f); favorites.delete(f); });
  // Reload page
  loadPage(currentPage);
  // Exit select mode
  selectMode = false;
  document.getElementById('grid').classList.remove('select-mode');
  document.getElementById('batchBar').classList.remove('open');
  document.getElementById('selectBtn').textContent = '☐ 选择';
  document.getElementById('selectBtn').classList.remove('active');
  selected.clear();
  updateBatchBar();
}

// Init — DB is authoritative, gen_web.py inserts on generation. No rescan needed.
async function initGallery() {
  await Promise.all([loadFavorites(), loadArchived()]);
  await loadPage(1);
  _firstLoad = false;
}
initGallery();

// bfcache restore (mobile back/forward): F5 doesn't fire load, this does
window.addEventListener('pageshow', e => {
  if (e.persisted) initGallery();
});
// Tab return: refresh list only (no rescan — metadata DB is authoritative)
let _firstLoad = true;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !_firstLoad && currentPage > 0) {
    loadPage(currentPage);
  }
});
</script>

<button id="theme-toggle" style="position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(128,128,128,0.3);background:var(--card);color:var(--text);font-size:1.2rem;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,0.15)" onclick="toggleTheme()" title="切换主题">☀️</button>

<script>
(function(){
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  window.toggleTheme = function(){
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  };
  setTimeout(function(){
    const btn = document.getElementById('theme-toggle');
    const theme = document.documentElement.getAttribute('data-theme');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }, 0);
})();
</script>
